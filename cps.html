<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced CPS Tester Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --accent: #38bdf8;
            --accent-hover: #0ea5e9; --danger: #ef4444; --success: #22c55e;
        }

        /* --- THEME DEFINITIONS (18 TOTAL) --- */
        [data-theme="light"] { --bg: #f1f5f9; --panel: #ffffff; --text: #0f172a; --accent: #2563eb; }
        [data-theme="neon"] { --bg: #000000; --panel: #111111; --text: #00ff41; --accent: #00ff41; }
        [data-theme="sunset"] { --bg: #2d1b2d; --panel: #4a264a; --text: #ffd166; --accent: #ef476f; }
        [data-theme="ocean"] { --bg: #001219; --panel: #005f73; --text: #94d2bd; --accent: #ee9b00; }
        [data-theme="forest"] { --bg: #061e16; --panel: #112d23; --text: #ecf3f0; --accent: #52b788; }
        
        /* New Themes */
        [data-theme="cyberpunk"] { --bg: #000; --panel: #1a1a1a; --text: #f3e600; --accent: #ff003c; }
        [data-theme="matrix"] { --bg: #000; --panel: #001100; --text: #00FF41; --accent: #008F11; }
        [data-theme="lavender"] { --bg: #f3f0ff; --panel: #ffffff; --text: #5b21b6; --accent: #8b5cf6; }
        [data-theme="midnight"] { --bg: #020617; --panel: #1e1b4b; --text: #e0e7ff; --accent: #6366f1; }
        [data-theme="rose"] { --bg: #fff1f2; --panel: #ffe4e6; --text: #9f1239; --accent: #f43f5e; }
        [data-theme="mint"] { --bg: #f0fdf4; --panel: #dcfce7; --text: #166534; --accent: #22c55e; }
        [data-theme="volcano"] { --bg: #180000; --panel: #450a0a; --text: #fca5a5; --accent: #ef4444; }
        [data-theme="space"] { --bg: #0b0118; --panel: #1a0b2e; --text: #e9d5ff; --accent: #d8b4fe; }
        [data-theme="sakura"] { --bg: #fff; --panel: #fff5f7; --text: #be185d; --accent: #f472b6; }
        [data-theme="coffee"] { --bg: #3e2723; --panel: #4e342e; --text: #d7ccc8; --accent: #a1887f; }
        [data-theme="nordic"] { --bg: #2e3440; --panel: #3b4252; --text: #eceff4; --accent: #88c0d0; }
        [data-theme="gold"] { --bg: #1a1a1a; --panel: #262626; --text: #d4af37; --accent: #ffd700; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .container {
            width: 95%;
            max-width: 850px;
            background: var(--panel);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
            text-align: center;
        }

        .header { display: flex; justify-content: space-around; margin-bottom: 2rem; }
        .stat-box { flex: 1; }
        .stat-value { font-size: 2rem; font-weight: 800; color: var(--accent); display: block; }

        #click-area {
            width: 100%;
            height: 300px;
            background: rgba(255,255,255,0.03);
            border: 4px dashed var(--accent);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            margin-bottom: 2rem;
            transition: transform 0.05s, border-color 0.3s;
        }
        #click-area:active { transform: scale(0.97); }
        #click-area.disabled { cursor: not-allowed; opacity: 0.4; border-style: solid; }
        
        .click-hint { font-size: 1.5rem; font-weight: bold; letter-spacing: 1px; }

        .main-controls { display: flex; gap: 1rem; align-items: center; justify-content: center; margin-bottom: 1rem; }
        button {
            padding: 0.8rem 1.8rem;
            border-radius: 0.6rem;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: filter 0.2s;
        }
        button:hover { filter: brightness(1.2); }
        .btn-reset { background: var(--danger); color: white; }
        .btn-settings { background: #475569; color: white; }

        /* Settings Grid */
        #settings-panel {
            display: none;
            text-align: left;
            background: rgba(0,0,0,0.15);
            padding: 2rem;
            border-radius: 1rem;
            margin-top: 1.5rem;
        }
        .theme-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 12px; 
            margin-top: 10px;
        }
        .theme-opt {
            display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1);
            padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            border: 1px solid transparent;
        }
        .theme-opt:hover { border-color: var(--accent); }
        .palette { display: flex; width: 35px; height: 22px; border-radius: 4px; overflow: hidden; border: 1px solid #000; flex-shrink: 0; }
        .pal-1 { width: 50%; height: 100%; }
        .pal-2 { width: 50%; height: 100%; }

        #results-container { display: none; margin-top: 2rem; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input {
            background: rgba(255,255,255,0.1); border: 1px solid var(--accent); color: var(--text);
            padding: 0.6rem; border-radius: 0.5rem; width: 100%; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="stat-box">TIME <span id="display-timer" class="stat-value">0.0s</span></div>
        <div class="stat-box">CPS <span id="display-cps" class="stat-value">0.00</span></div>
        <div class="stat-box">CLICKS <span id="display-clicks" class="stat-value">0</span></div>
    </div>

    <div id="click-area">
        <div class="click-hint" id="click-instruction">Click to Start</div>
        <div style="margin-top: 8px; opacity: 0.7;" id="key-hint">Input: Left Click</div>
    </div>

    <div class="main-controls">
        <div style="display: flex; align-items: center; gap: 10px;">
            <label>Seconds:</label>
            <input type="number" id="test-duration" value="5" min="1" max="60" style="width: 70px;">
        </div>
        <button class="btn-reset" onclick="resetTest()">Reset Test</button>
        <button class="btn-settings" onclick="toggleSettings()">Settings</button>
    </div>

    <div id="settings-panel">
        <h3 style="margin-top:0">Settings</h3>
        
        <div style="margin-bottom: 1.5rem;">
            <label><b>Binding (Keyboard CPS):</b></label>
            <input type="text" id="key-config" placeholder="Click to bind key..." readonly 
                   onclick="captureKey()" style="cursor: pointer; margin-top:5px; text-align: center;">
            <p style="font-size: 0.8rem; opacity: 0.8;">Click the box above then press any key to use that key instead of the mouse.</p>
        </div>

        <label><b>Color Themes (18 Options):</b></label>
        <div class="theme-grid" id="theme-grid">
            </div>
    </div>

    <div id="results-container">
        <hr style="opacity: 0.2; margin: 2rem 0;">
        <h3>Consistency Graph</h3>
        <canvas id="cpsChart"></canvas>
    </div>
</div>

<script>
    let clicks = 0;
    let startTime = null;
    let timerId = null;
    let isRunning = false;
    let isFinished = false;
    let clickHistory = [];
    let chartInstance = null;
    let inputKey = "MOUSE";

    const themes = [
        { id: 'dark', name: 'Dark Slate', c1: '#0f172a', c2: '#38bdf8' },
        { id: 'light', name: 'Pure Light', c1: '#f1f5f9', c2: '#2563eb' },
        { id: 'neon', name: 'Hacker Neon', c1: '#000', c2: '#00ff41' },
        { id: 'cyberpunk', name: 'Cyberpunk', c1: '#000', c2: '#ff003c' },
        { id: 'matrix', name: 'The Matrix', c1: '#001100', c2: '#00FF41' },
        { id: 'sunset', name: 'Retro Sunset', c1: '#2d1b2d', c2: '#ef476f' },
        { id: 'ocean', name: 'Deep Ocean', c1: '#001219', c2: '#ee9b00' },
        { id: 'forest', name: 'Deep Forest', c1: '#061e16', c2: '#52b788' },
        { id: 'lavender', name: 'Lavender', c1: '#f3f0ff', c2: '#8b5cf6' },
        { id: 'midnight', name: 'Midnight', c1: '#020617', c2: '#6366f1' },
        { id: 'rose', name: 'Rose Petal', c1: '#fff1f2', c2: '#f43f5e' },
        { id: 'mint', name: 'Fresh Mint', c1: '#f0fdf4', c2: '#22c55e' },
        { id: 'volcano', name: 'Volcano', c1: '#180000', c2: '#ef4444' },
        { id: 'space', name: 'Deep Space', c1: '#0b0118', c2: '#d8b4fe' },
        { id: 'sakura', name: 'Sakura', c1: '#fff5f7', c2: '#f472b6' },
        { id: 'coffee', name: 'Espresso', c1: '#3e2723', c2: '#a1887f' },
        { id: 'nordic', name: 'Nordic Blue', c1: '#2e3440', c2: '#88c0d0' },
        { id: 'gold', name: 'Luxury Gold', c1: '#1a1a1a', c2: '#d4af37' }
    ];

    function initThemes() {
        const grid = document.getElementById('theme-grid');
        themes.forEach(t => {
            const div = document.createElement('div');
            div.className = 'theme-opt';
            div.onclick = () => setTheme(t.id);
            div.innerHTML = `
                <div class="palette">
                    <div class="pal-1" style="background:${t.c1}"></div>
                    <div class="pal-2" style="background:${t.c2}"></div>
                </div>
                <span>${t.name}</span>
            `;
            grid.appendChild(div);
        });
    }

    function startTest() {
        if (isFinished || isRunning) return;
        isRunning = true;
        clicks = 0;
        clickHistory = [];
        startTime = Date.now();
        document.getElementById('click-instruction').innerText = "CLICK NOW!";
        timerId = setInterval(updateTimer, 10);
        registerClick();
    }

    function updateTimer() {
        const duration = parseFloat(document.getElementById('test-duration').value) || 5;
        const elapsed = (Date.now() - startTime) / 1000;
        const remaining = Math.max(0, duration - elapsed);
        
        document.getElementById('display-timer').innerText = remaining.toFixed(1) + "s";
        document.getElementById('display-cps').innerText = (clicks / Math.max(0.1, elapsed)).toFixed(2);

        if (remaining <= 0) endTest(duration);
    }

    function registerClick() {
        if (isFinished) return;
        if (!isRunning) { startTest(); return; }
        clicks++;
        document.getElementById('display-clicks').innerText = clicks;
        clickHistory.push({ time: (Date.now() - startTime) / 1000 });
    }

    function endTest(duration) {
        clearInterval(timerId);
        isRunning = false;
        isFinished = true;
        document.getElementById('click-area').classList.add('disabled');
        document.getElementById('click-instruction').innerText = "FINISHED";
        document.getElementById('display-timer').innerText = "0.0s";
        showChart(duration);
    }

    function resetTest() {
        clearInterval(timerId);
        isRunning = false;
        isFinished = false;
        clicks = 0;
        document.getElementById('display-clicks').innerText = "0";
        document.getElementById('display-cps').innerText = "0.00";
        document.getElementById('display-timer').innerText = document.getElementById('test-duration').value + ".0s";
        document.getElementById('click-area').classList.remove('disabled');
        document.getElementById('click-instruction').innerText = "Click to Start";
        document.getElementById('results-container').style.display = 'none';
    }

    function captureKey() {
        const cfg = document.getElementById('key-config');
        cfg.value = "Press any key...";
        const listener = (e) => {
            e.preventDefault();
            inputKey = e.key === " " ? "Space" : e.key;
            cfg.value = inputKey;
            document.getElementById('key-hint').innerText = `Input: ${inputKey}`;
            window.removeEventListener('keydown', listener);
        };
        window.addEventListener('keydown', listener);
    }

    function setTheme(id) {
        document.body.setAttribute('data-theme', id);
        if (isFinished) showChart(); // Refresh chart color
    }

    function toggleSettings() {
        const p = document.getElementById('settings-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function showChart(duration) {
        document.getElementById('results-container').style.display = 'block';
        const ctx = document.getElementById('cpsChart').getContext('2d');
        const accent = getComputedStyle(document.body).getPropertyValue('--accent').trim();
        
        const labels = [];
        const data = [];
        const dur = duration || parseFloat(document.getElementById('test-duration').value);

        for (let i = 1; i <= Math.ceil(dur); i++) {
            labels.push(`${i}s`);
            const count = clickHistory.filter(c => c.time > (i-1) && c.time <= i).length;
            data.push(count);
        }

        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Clicks / Sec',
                    data: data,
                    borderColor: accent,
                    backgroundColor: accent + '33',
                    fill: true,
                    tension: 0.3,
                    borderWidth: 3
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    document.getElementById('click-area').onmousedown = (e) => { if (inputKey === "MOUSE") registerClick(); };
    window.onkeydown = (e) => { 
        if (inputKey !== "MOUSE" && e.key.toLowerCase() === inputKey.toLowerCase()) {
            if (!e.repeat) registerClick();
            if (e.key === " ") e.preventDefault();
        }
    };

    initThemes();
</script>
</body>
</html>
